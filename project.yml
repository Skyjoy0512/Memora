name: Memora
options:
  bundleIdPrefix: com.memora
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
  createIntermediateGroups: true
  transitivelyLinksDependencies: true
  defaultConfig: Debug
packages:
  OmiSDK:
    url: https://github.com/BasedHardware/omi
    revision: 07571705531ccf1d3ce2d41f7b8d166a85287693
targets:
  Memora:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Memora
        includes: ["**/*.swift"]
    dependencies:
      - package: OmiSDK
        product: omi-lib
    settings:
      PRODUCT_NAME: Memora
      PRODUCT_BUNDLE_IDENTIFIER: 4R82H2PVGL.com.memora.Memora
      SWIFT_VERSION: 5.5
      TARGETED_DEVICE_FAMILY: "1,2"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_FILE: Memora/Resources/Info.plist
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "iPhone Developer"
      DEVELOPMENT_TEAM: 4R82H2PVGL
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      ENABLE_PREVIEWS: YES
      DEVELOPMENT_ASSET_PATHS: "\"Memora/Resources/Preview Content\""
  MemoraTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MemoraTests
        includes: ["**/*.swift"]
    dependencies:
      - target: Memora
    settings:
      PRODUCT_NAME: MemoraTests
      PRODUCT_BUNDLE_IDENTIFIER: 4R82H2PVGL.com.memora.MemoraTests
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "iPhone Developer"
      DEVELOPMENT_TEAM: 4R82H2PVGL
schemes:
  Memora:
    build:
      targets:
        Memora: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MemoraTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
