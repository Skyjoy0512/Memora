name: PR Progress Comment

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  notify-linked-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const refs = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi)]
              .map(match => Number(match[1]))
              .filter(number => !Number.isNaN(number));

            if (refs.length === 0) {
              core.info('No linked issue references found in PR body.');
              return;
            }

            let message;
            if (context.payload.action === 'closed') {
              message = pr.merged
                ? `PR #${pr.number} was merged into \`${pr.base.ref}\`.`
                : `PR #${pr.number} was closed without merge.`;
            } else if (context.payload.action === 'ready_for_review') {
              message = `PR #${pr.number} is now ready for review.`;
            } else {
              message = `PR #${pr.number} is active (\`${pr.state}\`).`;
            }

            const comment = [
              '### Agent Progress Update',
              message,
              '',
              `PR: ${pr.html_url}`,
              `Branch: \`${pr.head.ref}\``
            ].join('\n');

            for (const issueNumber of refs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: comment
              });
              core.info(`Posted progress comment to #${issueNumber}`);
            }

