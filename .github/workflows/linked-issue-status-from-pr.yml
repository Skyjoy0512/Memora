name: Linked Issue Status From PR

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  sync-linked-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Sync linked issue status labels from PR state
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const body = pr.body || '';

            const refs = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|ref(?:s|er(?:s|enced)?)?)\s+#(\d+)/gi)]
              .map(match => Number(match[1]))
              .filter(number => !Number.isNaN(number));

            if (refs.length === 0) {
              core.info('No linked issues found in PR body.');
              return;
            }

            const statusLabels = ['status:todo', 'status:in-progress', 'status:review', 'status:done'];

            function targetStatus() {
              if (action === 'closed') return pr.merged ? 'status:done' : 'status:in-progress';
              if (action === 'ready_for_review') return 'status:review';
              if (action === 'converted_to_draft') return 'status:in-progress';
              if (action === 'opened' || action === 'reopened' || action === 'synchronize') {
                return pr.draft ? 'status:in-progress' : 'status:review';
              }
              return null;
            }

            const target = targetStatus();
            if (!target) return;

            const prLabels = (pr.labels || []).map(label => label.name);
            const laneLabel = prLabels.find(name => name.startsWith('lane:'));

            for (const issueNumber of refs) {
              const current = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });

              const labels = current.data.map(label => label.name);
              const kept = labels.filter(name => !statusLabels.includes(name));
              kept.push(target);

              // If PR has lane label and linked issue doesn't, align it for visibility.
              if (laneLabel && !kept.some(name => name.startsWith('lane:'))) {
                kept.push(laneLabel);
              }

              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [...new Set(kept)]
              });

              core.info(`Issue #${issueNumber} -> ${target}`);
            }

