jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve Swift Package Dependencies
        run: |
          cd Memora
          xcodebuild -resolvePackageDependencies

      - name: Build project
        run: |
          cd Memora
          xcodebuild -scheme Memora -configuration Debug clean build

      - name: Run tests
        run: |
          cd Memora
          xcodebuild test -scheme Memora -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 16 Pro'
