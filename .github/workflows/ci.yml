# Memora GitHub Actions Configuration
name: iOS CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Resolve Swift Package Dependencies
        run: |
          cd Memora.xcodeproj/..
          xcodebuild -resolvePackageDependencies -scheme Memora

      - name: Build
        run: |
          xcodebuild clean build \
            -scheme Memora \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -scheme Memora \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./DerivedData \
            -CODE_SIGN_IDENTITY="" \
            -CODE_SIGNING_REQUIRED=NO
