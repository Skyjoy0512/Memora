name: Auto PR From Branch Push

on:
  push:
    branches-ignore:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const base = 'master';

            if (branch === base) {
              core.info('Base branch push; skipping.');
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base
            });

            if (existing.data.length > 0) {
              core.info(`PR already exists: #${existing.data[0].number}`);
              return;
            }

            const latestMessage = context.payload.head_commit?.message?.split('\n')[0] || branch;
            const title = `[Auto PR] ${branch}`;
            const body = [
              'This PR was auto-created from a branch push.',
              '',
              `- Branch: \`${branch}\``,
              `- Latest commit: ${latestMessage}`,
              '',
              'Please fill the PR template and link an issue using `Closes #<issue-number>`.'
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base,
              body,
              draft: true
            });

            core.info(`Created PR #${pr.data.number}`);

